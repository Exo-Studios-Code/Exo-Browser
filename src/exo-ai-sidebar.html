<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" />
  <title>Exo AI Sidebar</title>
  <style>
    /* Tato stránka se načítá jako BrowserWindow (průhledný panel napravo).
       Sdílí vizuální jazyk s Exo Browserem — dark glass, purple accents. */

    :root {
      --bg:       rgba(8, 8, 16, 0.97);
      --surface:  rgba(14, 14, 26, 0.98);
      --border:   rgba(167, 139, 250, .18);
      --accent:   #a78bfa;
      --accent2:  #38bdf8;
      --text:     #e2e8f0;
      --text-dim: #64748b;
      --green:    #4ade80;
      --red:      #f87171;
      --r:        10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'system-ui', sans-serif;
      font-size: 13.5px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    #ai-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      background: var(--surface);
    }
    #ai-header-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #btn-ai-summarize {
      margin-left: auto;
      background: rgba(167,139,250,.1);
      border: 1px solid rgba(167,139,250,.25);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    #btn-ai-summarize:hover { background: rgba(167,139,250,.2); }
    #btn-ai-summarize:disabled { opacity: .4; cursor: default; }
    #btn-ai-close {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      transition: color .15s;
    }
    #btn-ai-close:hover { color: var(--red); }

    /* ── Page context pill ───────────────────────────────────────── */
    #page-ctx {
      padding: 8px 14px;
      background: rgba(167,139,250,.06);
      border-bottom: 1px solid var(--border);
      font-size: 11.5px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
      display: none;
    }
    #page-ctx.visible { display: block; }
    #page-ctx strong { color: var(--accent); }

    /* ── Messages ────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(167,139,250,.2); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-width: 100%;
    }
    .msg-bubble {
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user  .msg-bubble {
      background: rgba(167,139,250,.15);
      border: 1px solid rgba(167,139,250,.22);
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }
    .msg.ai .msg-bubble {
      background: rgba(14,14,26,.8);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .msg-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .07em;
      color: var(--text-dim);
      padding: 0 3px;
    }
    .msg.user .msg-label { align-self: flex-end; }
    .msg.ai   .msg-label { align-self: flex-start; color: var(--accent); }

    /* Typing indicator */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 2px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity:.2; } 40% { opacity:1; } }

    /* Empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 32px 20px;
      color: var(--text-dim);
      text-align: center;
      font-size: 12.5px;
    }
    #empty-state svg { opacity: .3; }
    #empty-state p { line-height: 1.5; }

    /* ── Input area ──────────────────────────────────────────────── */
    #input-area {
      padding: 10px 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--surface);
    }
    #ai-input {
      flex: 1;
      background: rgba(14,14,26,.9);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 12px;
      resize: none;
      min-height: 36px;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      line-height: 1.45;
      transition: border-color .2s;
    }
    #ai-input:focus { border-color: var(--accent); }
    #ai-input::placeholder { color: var(--text-dim); }
    #btn-ai-send {
      background: rgba(167,139,250,.15);
      border: 1px solid rgba(167,139,250,.3);
      color: var(--accent);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s;
      flex-shrink: 0;
    }
    #btn-ai-send:hover   { background: rgba(167,139,250,.28); }
    #btn-ai-send:disabled { opacity: .35; cursor: default; }

    /* ── Pill suggestions ────────────────────────────────────────── */
    #suggestions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 12px 8px;
    }
    .suggestion-pill {
      background: rgba(56,189,248,.08);
      border: 1px solid rgba(56,189,248,.18);
      color: var(--accent2);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11.5px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .suggestion-pill:hover { background: rgba(56,189,248,.18); }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="ai-header">
    <svg viewBox="0 0 16 16" fill="none" width="14" style="flex-shrink:0">
      <circle cx="8" cy="8" r="6" stroke="url(#grad)" stroke-width="1.3"/>
      <path d="M5 8h6M8 5v6" stroke="url(#grad)" stroke-width="1.3" stroke-linecap="round"/>
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#38bdf8"/>
        </linearGradient>
      </defs>
    </svg>
    <span id="ai-header-title">EXO AI</span>
    <button id="btn-ai-summarize" title="Sumarizovat aktuální stránku">∑ Sumarizovat</button>
    <button id="btn-ai-close" title="Zavřít AI panel" aria-label="Zavřít">
      <svg viewBox="0 0 10 10" width="10" fill="none">
        <path d="M1.5 1.5l7 7M8.5 1.5l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Page context -->
  <div id="page-ctx"></div>

  <!-- Messages -->
  <div id="messages">
    <div id="empty-state">
      <svg viewBox="0 0 40 40" fill="none" width="40">
        <circle cx="20" cy="20" r="16" stroke="#a78bfa" stroke-width="1.2"/>
        <path d="M13 20h14M20 13v14" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <p>Zeptej se čehokoli o aktuální stránce,<br>nebo začni konverzaci s AI asistentem.</p>
    </div>
  </div>

  <!-- Quick suggestions -->
  <div id="suggestions">
    <button class="suggestion-pill" data-q="Co je hlavním tématem této stránky?">📋 O čem je stránka</button>
    <button class="suggestion-pill" data-q="Shrň klíčové informace v bodech.">📝 Klíčové body</button>
    <button class="suggestion-pill" data-q="Vysvětli mi nejdůležitější pojmy na stránce.">💡 Vysvětlit pojmy</button>
  </div>

  <!-- Input area -->
  <div id="input-area">
    <textarea id="ai-input" placeholder="Zeptej se AI na stránku…" rows="1" aria-label="AI dotaz"></textarea>
    <button id="btn-ai-send" title="Odeslat (Enter)" aria-label="Odeslat">
      <svg viewBox="0 0 14 14" fill="none" width="14">
        <path d="M1.5 7h11M7.5 2.5L12.5 7l-5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script>
    'use strict';

    const api = window.browserAPI;
    if (!api) { console.error('[AI-Sidebar] browserAPI nedostupné'); }

    // ─── DOM ─────────────────────────────────────────────────────
    const messagesEl   = document.getElementById('messages');
    const emptyState   = document.getElementById('empty-state');
    const aiInput      = document.getElementById('ai-input');
    const btnSend      = document.getElementById('btn-ai-send');
    const btnSummarize = document.getElementById('btn-ai-summarize');
    const btnClose     = document.getElementById('btn-ai-close');
    const pageCtxEl    = document.getElementById('page-ctx');
    const suggestions  = document.querySelectorAll('.suggestion-pill');

    // ─── State ───────────────────────────────────────────────────
    /** @type {{ role: 'user'|'ai', content: string }[]} */
    let history = [];
    let pageContext = null;
    let isBusy = false;

    // ─── Receive page context from main window via postMessage ───
    window.addEventListener('message', (ev) => {
      if (ev.data?.type === 'set-page-context') {
        pageContext = ev.data.context;
        if (pageContext) {
          pageCtxEl.innerHTML = `<strong>Stránka:</strong> ${esc(pageContext)}`;
          pageCtxEl.classList.add('visible');
        } else {
          pageCtxEl.classList.remove('visible');
        }
      }
    });

    // Also listen for IPC-style updates from preload
    if (api?.onAiSidebarContext) {
      api.onAiSidebarContext((ctx) => {
        pageContext = ctx;
        if (ctx) {
          pageCtxEl.innerHTML = `<strong>Stránka:</strong> ${esc(ctx)}`;
          pageCtxEl.classList.add('visible');
        }
      });
    }

    // ─── Add message bubble ───────────────────────────────────────
    function addMessage(role, content) {
      emptyState.style.display = 'none';

      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'user' ? 'TY' : 'EXO AI';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = content;

      msg.appendChild(label);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      history.push({ role: role === 'user' ? 'user' : 'assistant', content });
      return msg;
    }

    function addTyping() {
      emptyState.style.display = 'none';
      const msg = document.createElement('div');
      msg.className = 'msg ai';
      msg.id = 'typing-indicator';
      msg.innerHTML = `
        <div class="msg-label">EXO AI</div>
        <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return msg;
    }

    function removeTyping() {
      document.getElementById('typing-indicator')?.remove();
    }

    // ─── Send message ─────────────────────────────────────────────
    async function sendMessage(text) {
      if (!text?.trim() || isBusy) return;
      isBusy = true;
      setBusy(true);

      addMessage('user', text.trim());
      const typing = addTyping();

      try {
        const res = await api.aiChat(history.slice(-12), pageContext);
        removeTyping();
        if (res.error) {
          addMessage('ai', `⚠ ${res.error}`);
        } else {
          addMessage('ai', res.reply);
        }
      } catch (err) {
        removeTyping();
        addMessage('ai', `⚠ Chyba: ${err.message}`);
      }

      isBusy = false;
      setBusy(false);
    }

    // ─── Summarize page ───────────────────────────────────────────
    btnSummarize.addEventListener('click', async () => {
      if (isBusy) return;
      isBusy = true;
      setBusy(true);

      // Extract page text from active tab via IPC
      let pageText = '';
      try {
        const res = await api.getPageText?.();
        pageText = res || '';
      } catch (_) {}

      addMessage('user', '∑ Sumarizuj tuto stránku');
      const typing = addTyping();

      try {
        const res = await api.aiSummarizePage(pageText);
        removeTyping();
        if (res.error) {
          addMessage('ai', `⚠ ${res.error}`);
        } else {
          addMessage('ai', res.summary);
          // Add to history so user can ask follow-up questions
          history.push({ role: 'assistant', content: res.summary });
        }
      } catch (err) {
        removeTyping();
        addMessage('ai', `⚠ Chyba: ${err.message}`);
      }

      isBusy = false;
      setBusy(false);
    });

    // ─── UI helpers ───────────────────────────────────────────────
    function setBusy(busy) {
      aiInput.disabled    = busy;
      btnSend.disabled    = busy;
      btnSummarize.disabled = busy;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ─── Auto-resize textarea ─────────────────────────────────────
    aiInput.addEventListener('input', () => {
      aiInput.style.height = 'auto';
      aiInput.style.height = Math.min(aiInput.scrollHeight, 120) + 'px';
    });

    // ─── Events ──────────────────────────────────────────────────
    btnSend.addEventListener('click', () => {
      const t = aiInput.value.trim();
      aiInput.value = '';
      aiInput.style.height = '';
      sendMessage(t);
    });

    aiInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        btnSend.click();
      }
    });

    suggestions.forEach(pill => {
      pill.addEventListener('click', () => {
        sendMessage(pill.dataset.q);
      });
    });

    btnClose.addEventListener('click', () => {
      api?.toggleAiSidebar?.(false);
    });
  </script>
</body>
</html>
