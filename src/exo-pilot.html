<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <!--
    CSP: 'unsafe-inline' pro embedded <style> a <script>,
    Google Fonts pro JetBrains Mono.
    Script src je omezeno na 'self' (exo-pilot.js je lokální soubor).
  -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data:;" />
  <title>Exo-Pilot</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ──────────────────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Palette — fialovo-modrá Cyber-Deck */
      --c-bg:       rgba(8, 8, 22, 0.95);
      --c-surface:  rgba(20, 14, 42, 0.6);
      --c-border:   rgba(139, 92, 246, 0.28);
      --c-purple:   #a78bfa;
      --c-purple-d: #8b5cf6;
      --c-blue:     #38bdf8;
      --c-blue-d:   #0ea5e9;
      --c-pink:     #f472b6;
      --c-text:     #d8b4fe;
      --c-dim:      rgba(196, 181, 253, 0.38);
      --c-ok:       #4ade80;
      --c-error:    #f87171;
      --c-warn:     #fbbf24;
      --r-panel:    10px;

      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    }

    html, body {
      width:  100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    /* ─── Outer Wrapper — provides the 8px padding around the panel ────────── */
    #root {
      position: absolute;
      inset: 8px;
      display: flex;
      flex-direction: column;
    }

    /* ─── Main Panel ────────────────────────────────────────────────────────── */
    #pilot-panel {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;

      background: var(--c-bg);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);

      border: 1px solid var(--c-border);
      border-radius: var(--r-panel);

      box-shadow:
        0 0 0 1px rgba(139, 92, 246, 0.08),
        0 0 40px rgba(109, 40, 217, 0.22),
        0 0 80px rgba(56, 189, 248, 0.06),
        0 24px 64px rgba(0, 0, 0, 0.72);

      transition: box-shadow 0.35s ease;
    }

    /* State glow — triggered via JS class */
    #pilot-panel.state-thinking {
      box-shadow:
        0 0 0 1px rgba(56, 189, 248, 0.2),
        0 0 40px rgba(14, 165, 233, 0.28),
        0 0 80px rgba(56, 189, 248, 0.1),
        0 24px 64px rgba(0, 0, 0, 0.72);
    }
    #pilot-panel.state-executing {
      box-shadow:
        0 0 0 1px rgba(244, 114, 182, 0.2),
        0 0 40px rgba(236, 72, 153, 0.25),
        0 0 80px rgba(244, 114, 182, 0.08),
        0 24px 64px rgba(0, 0, 0, 0.72);
    }

    /* ── Scanlines ─────────────────────────────────────────────────────────── */
    #scanlines {
      position: absolute;
      inset: 0;
      border-radius: var(--r-panel);
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 1px,
        rgba(0, 0, 0, 0.06) 1px, rgba(0, 0, 0, 0.06) 2px
      );
      pointer-events: none;
      z-index: 50;
    }

    /* ── Corner Brackets ───────────────────────────────────────────────────── */
    .corner {
      position: absolute;
      width: 14px; height: 14px;
      pointer-events: none;
      z-index: 51;
    }
    .corner.tl { top: -1px;  left: -1px;  border-top:    1.5px solid var(--c-purple); border-left:  1.5px solid var(--c-purple); border-top-left-radius:     var(--r-panel); }
    .corner.tr { top: -1px;  right: -1px; border-top:    1.5px solid var(--c-purple); border-right: 1.5px solid var(--c-purple); border-top-right-radius:    var(--r-panel); }
    .corner.bl { bottom: -1px; left: -1px;  border-bottom: 1.5px solid var(--c-blue);   border-left:  1.5px solid var(--c-blue);   border-bottom-left-radius:  var(--r-panel); }
    .corner.br { bottom: -1px; right: -1px; border-bottom: 1.5px solid var(--c-blue);   border-right: 1.5px solid var(--c-blue);   border-bottom-right-radius: var(--r-panel); }

    /* ─── Header ─────────────────────────────────────────────────────────────*/
    #pilot-header {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 12px;
      height: 40px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(139, 92, 246, 0.12);
      background: linear-gradient(
        135deg,
        rgba(109, 40, 217, 0.08) 0%,
        rgba(14, 165, 233, 0.04) 100%
      );
    }

    /* Status LED */
    #led {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--c-purple);
      box-shadow: 0 0 6px var(--c-purple-d);
      animation: led-breathe 3s ease-in-out infinite;
    }
    #led.thinking {
      background: var(--c-blue);
      box-shadow: 0 0 10px var(--c-blue-d);
      animation: led-pulse 0.45s ease-in-out infinite alternate;
    }
    #led.executing {
      background: var(--c-pink);
      box-shadow: 0 0 10px var(--c-pink);
      animation: led-pulse 0.22s ease-in-out infinite alternate;
    }

    @keyframes led-breathe { 0%,100%{opacity:.6} 50%{opacity:1} }
    @keyframes led-pulse    { from{opacity:.4; transform:scale(.9)} to{opacity:1; transform:scale(1)} }

    /* Title */
    #pilot-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--c-purple);
      text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
      flex: 1;
    }

    /* Status badge */
    #pilot-status {
      font-size: 8.5px;
      letter-spacing: 0.14em;
      padding: 2px 7px;
      border-radius: 3px;
      background: rgba(167, 139, 250, 0.08);
      border: 1px solid rgba(167, 139, 250, 0.14);
      color: var(--c-dim);
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    #pilot-status.thinking {
      color: var(--c-blue);
      background: rgba(56, 189, 248, 0.1);
      border-color: rgba(56, 189, 248, 0.25);
    }
    #pilot-status.executing {
      color: var(--c-pink);
      background: rgba(244, 114, 182, 0.1);
      border-color: rgba(244, 114, 182, 0.25);
    }

    /* Close button */
    #pilot-close {
      -webkit-app-region: no-drag;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--c-dim);
      cursor: pointer;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    #pilot-close:hover { color: var(--c-error); background: rgba(248,113,113,.1); }

    /* ─── Log ────────────────────────────────────────────────────────────────*/
    #pilot-log {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 10px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scroll-behavior: smooth;
    }

    #pilot-log::-webkit-scrollbar { width: 3px; }
    #pilot-log::-webkit-scrollbar-track { background: transparent; }
    #pilot-log::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.2);
      border-radius: 2px;
    }

    /* Boot lines */
    .log-boot {
      font-size: 9px;
      color: rgba(167, 139, 250, 0.28);
      letter-spacing: 0.04em;
      line-height: 1.6;
    }
    .log-sep {
      font-size: 9px;
      color: rgba(167, 139, 250, 0.14);
      margin: 2px 0;
    }

    /* Log entry row */
    .log-entry {
      display: flex;
      align-items: baseline;
      gap: 7px;
      line-height: 1.55;
      animation: log-slide-in 0.18s ease-out both;
    }
    @keyframes log-slide-in {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .log-ts {
      font-size: 8.5px;
      color: rgba(167, 139, 250, 0.25);
      flex-shrink: 0;
      width: 52px;
    }

    .log-badge {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      padding: 1.5px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      min-width: 52px;
      text-align: center;
    }
    /* Badge color variants */
    .badge-user    { color: var(--c-blue);   background: rgba(56,189,248,.09);  border: 1px solid rgba(56,189,248,.2); }
    .badge-pilot   { color: var(--c-purple); background: rgba(167,139,250,.08); border: 1px solid rgba(167,139,250,.18); }
    .badge-action  { color: var(--c-pink);   background: rgba(244,114,182,.08); border: 1px solid rgba(244,114,182,.2); }
    .badge-ok      { color: var(--c-ok);     background: rgba(74,222,128,.08);  border: 1px solid rgba(74,222,128,.2); }
    .badge-error   { color: var(--c-error);  background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); }
    .badge-system  { color: var(--c-dim);    background: rgba(167,139,250,.04); border: 1px solid rgba(167,139,250,.1); }

    .log-text       { font-size: 11px; color: var(--c-text); }
    .log-text.dim   { color: var(--c-dim); font-size: 10.5px; }

    /* Thinking animation — runs until element is removed */
    .thinking-anim::after {
      content: '';
      display: inline-block;
      width: 1.2em;
      animation: thinking-dots 1s steps(4, end) infinite;
    }
    @keyframes thinking-dots {
      0%  { content: '.'; }
      25% { content: '..'; }
      50% { content: '...'; }
      75% { content: ''; }
    }

    /* ─── Divider ────────────────────────────────────────────────────────────*/
    #pilot-divider {
      height: 1px;
      margin: 0 12px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(139, 92, 246, 0.18) 30%,
        rgba(56, 189, 248, 0.14) 70%,
        transparent
      );
      flex-shrink: 0;
    }

    /* ─── Input Row ──────────────────────────────────────────────────────────*/
    #pilot-input-row {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      height: 44px;
      flex-shrink: 0;
      background: rgba(109, 40, 217, 0.04);
    }

    #prompt-symbol {
      font-size: 13px;
      font-weight: 600;
      color: var(--c-purple);
      text-shadow: 0 0 8px rgba(167,139,250,.6);
      flex-shrink: 0;
      user-select: none;
    }

    #pilot-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--c-text);
      font-family: inherit;
      font-size: 11.5px;
      caret-color: var(--c-purple);
      user-select: text;
    }
    #pilot-input::placeholder { color: rgba(167,139,250,.22); }
    #pilot-input:disabled      { opacity: .45; cursor: not-allowed; }

    #pilot-send {
      -webkit-app-region: no-drag;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(109, 40, 217, 0.18);
      border: 1px solid rgba(167, 139, 250, 0.24);
      border-radius: 6px;
      color: var(--c-purple);
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, box-shadow .15s, transform .1s;
    }
    #pilot-send:hover:not(:disabled) {
      background: rgba(109,40,217,.32);
      box-shadow: 0 0 12px rgba(139,92,246,.4);
    }
    #pilot-send:active:not(:disabled) { transform: scale(.9); }
    #pilot-send:disabled { opacity: .3; cursor: not-allowed; }

  </style>
</head>
<body>

  <div id="root">
    <div id="pilot-panel">

      <!-- Scanlines overlay -->
      <div id="scanlines" aria-hidden="true"></div>

      <!-- Corner brackets -->
      <div class="corner tl" aria-hidden="true"></div>
      <div class="corner tr" aria-hidden="true"></div>
      <div class="corner bl" aria-hidden="true"></div>
      <div class="corner br" aria-hidden="true"></div>

      <!-- ── Header ─────────────────────────────────────────────────────── -->
      <div id="pilot-header">
        <div id="led" aria-hidden="true"></div>
        <span id="pilot-title">EXO·PILOT</span>
        <span id="pilot-status">IDLE</span>
        <button id="pilot-close" title="Zavřít (Esc)" aria-label="Zavřít Exo-Pilot">
          <svg viewBox="0 0 10 10" fill="none" width="9">
            <path d="M1.5 1.5l7 7M8.5 1.5l-7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- ── Log ────────────────────────────────────────────────────────── -->
      <div id="pilot-log" role="log" aria-label="Exo-Pilot log" aria-live="polite">
        <div class="log-boot">EXO·PILOT v1.0 ─ Autonomous Browser Agent</div>
        <div class="log-boot">Engine: Anthropic API · Kontext: aktivní tab</div>
        <div class="log-boot">Klávesová zkratka: Ctrl+Shift+Space</div>
        <div class="log-sep">── ── ── ── ── ── ── ── ── ── ── ── ── ──</div>
      </div>

      <div id="pilot-divider" aria-hidden="true"></div>

      <!-- ── Input ──────────────────────────────────────────────────────── -->
      <div id="pilot-input-row">
        <span id="prompt-symbol" aria-hidden="true">&gt;_</span>
        <input
          id="pilot-input"
          type="text"
          placeholder="Zadej příkaz pro AI agenta…"
          autocomplete="off"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
          aria-label="Příkaz pro Exo-Pilot"
          autofocus
        />
        <button id="pilot-send" title="Odeslat (Enter)" aria-label="Odeslat příkaz">
          <svg viewBox="0 0 14 14" fill="none" width="11">
            <path d="M1.5 7h11M8.5 2.5L13 7l-4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

    </div><!-- /#pilot-panel -->
  </div><!-- /#root -->

  <script src="exo-pilot.js"></script>
</body>
</html>
